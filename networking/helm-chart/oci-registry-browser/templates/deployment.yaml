apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oci-registry-browser.fullname" . }}
  labels:
    {{- include "oci-registry-browser.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "oci-registry-browser.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "oci-registry-browser.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "oci-registry-browser.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: service-port
              containerPort: {{ .Values.service.port }}
              protocol: TCP

          livenessProbe:
            httpGet:
              path: {{ .Values.baseApiPath }}/api/probes/liveness
              port: service-port
            initialDelaySeconds: 20
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: {{ .Values.baseApiPath }}/api/probes/readiness
              port: service-port
            initialDelaySeconds: 5
            periodSeconds: 60

          env:
          # Backend ENVIRONMENT SETTINGS
          - name: PG_HOST
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: pgHost
          - name: PG_PORT
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: pgPort
          - name: PG_NAME
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: pgName
          - name: PG_USER
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: pgUser
          - name: PG_PASS
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: pgPass
          - name: PG_SSLMODE
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: pgSslMode

          - name: REDIS_HOST
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: redisHost
          - name: REDIS_PORT
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: redisPort
          - name: REDIS_PWD
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: redisPwd
          - name: REDIS_DB
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: redisDb

          - name: LOG_LEVEL
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: logLevel
          - name: JWT_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: jwtSecretKey
          - name: SEED_ADMIN_NAME
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: seedAdminName
          - name: SEED_ADMIN_PASS
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-auth
                key: seedAdminPass

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
